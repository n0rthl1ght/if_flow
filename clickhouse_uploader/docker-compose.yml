services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: if_flow_clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      TZ: ${TZ:-Europe/Moscow}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-if_flow}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change_me_clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ./storage/clickhouse/data:/var/lib/clickhouse
      - ./storage/clickhouse/logs:/var/log/clickhouse-server
      - ./schema.sql:/docker-entrypoint-initdb.d/01_if_flow_schema.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  grafana:
    image: grafana/grafana-oss:latest
    container_name: if_flow_grafana
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_started
    environment:
      TZ: ${TZ:-Europe/Moscow}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana_admin}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_SERVICE_HOST: ${CLICKHOUSE_SERVICE_HOST:-clickhouse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-if_flow}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change_me_clickhouse}
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./storage/grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
